<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weather App Replica - Live Data</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f4f4f4" id="theme-color-meta">
    <link rel="apple-touch-icon" href="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white' stroke='black' stroke-width='2'%3E%3Crect width='24' height='24' fill='white' stroke='none'/%3E%3Ccircle cx='12' cy='12' r='4'/%3E%3Cpath d='M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41'/%3E%3C/svg%3E">
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22Weather%20App%22%2C%22short_name%22%3A%22Weather%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23e5e7eb%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%3Bcharset%3Dutf-8%2C%253Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%2024%2024%27%20fill%3D%27white%27%20stroke%3D%27black%27%20stroke-width%3D%272%27%253E%253Crect%20width%3D%2724%27%20height%3D%2724%27%20fill%3D%27white%27%20stroke%3D%27none%27%2F%253E%253Ccircle%20cx%3D%2712%27%20cy%3D%2712%27%20r%3D%274%27%2F%253E%253Cpath%20d%3D%27M12%202v2M12%2020v2M4.93%204.93l1.41%201.41M17.66%2017.66l1.41%201.41M2%2012h2M20%2012h2M6.34%2017.66l-1.41%201.41M19.07%204.93l-1.41%201.41%27%2F%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #e5e7eb;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        
        const formatTime = (isoString, isNow = false) => {
            if (isNow) return "Now";
            const date = new Date(isoString);
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
        };

        const formatTimeAmPm = (isoString) => {
            if (!isoString) return "--:--";
            const date = new Date(isoString);
            let str = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            return str.toLowerCase().replace(' am', ' a.m.').replace(' pm', ' p.m.');
        };

        const formatDate = (isoString, short = false) => {
            const date = new Date(isoString);
            if (short) {
                return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
            }
            return date.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
        };

        const getWindDirection = (degree) => {
            if (degree > 337.5) return 'N';
            if (degree > 292.5) return 'NW';
            if (degree > 247.5) return 'W';
            if (degree > 202.5) return 'SW';
            if (degree > 157.5) return 'S';
            if (degree > 112.5) return 'SE';
            if (degree > 67.5) return 'E';
            if (degree > 22.5) return 'NE';
            return 'N';
        };

        const getUVText = (uv) => {
            if (uv <= 2) return `${Math.round(uv)} low`;
            if (uv <= 5) return `${Math.round(uv)} mod`;
            if (uv <= 7) return `${Math.round(uv)} high`;
            return `${Math.round(uv)} v.high`;
        };

        const getWeatherIcon = (code) => {
            if (code === 0) return 'sun';
            if ([1, 2, 3, 45, 48].includes(code)) return 'cloud';
            if ([51, 53, 55, 61, 63, 65, 80, 81, 82, 95, 96, 99].includes(code)) return 'rain';
            if ([71, 73, 75, 77, 85, 86].includes(code)) return 'snow';
            return 'cloud';
        };

        const Icon = ({ name, className }) => {
            if (name === 'sun') {
                return (
                    <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                        <circle cx="12" cy="12" r="4" /><path d="M12 2v2" /><path d="M12 20v2" /><path d="m4.93 4.93 1.41 1.41" /><path d="m17.66 17.66 1.41 1.41" /><path d="M2 12h2" /><path d="M20 12h2" /><path d="m6.34 17.66-1.41 1.41" /><path d="m19.07 4.93-1.41 1.41" />
                    </svg>
                );
            }
            if (name === 'cloud') {
                return (
                    <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" />
                    </svg>
                );
            }
            if (name === 'rain') {
                return (
                    <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" /><path d="M16 23v-6" /><path d="M8 23v-6" /><path d="M12 23v-6" />
                    </svg>
                );
            }
            if (name === 'snow') {
                return (
                    <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" /><path d="M8 23h.01" /><path d="M12 23h.01" /><path d="M16 23h.01" /><path d="M8 19h.01" /><path d="M12 19h.01" /><path d="M16 19h.01" />
                    </svg>
                );
            }
            return null;
        };

        const App = () => {
            const [isDark, setIsDark] = React.useState(false);
            const [location, setLocation] = React.useState({ name: "Hagen, Germany", lat: 51.3594, lon: 7.4764 });
            const [weatherData, setWeatherData] = React.useState(null);
            const [isLoading, setIsLoading] = React.useState(true);
            
            const [isSearchOpen, setIsSearchOpen] = React.useState(false);
            const [searchQuery, setSearchQuery] = React.useState("");
            const [searchResults, setSearchResults] = React.useState([]);
            const [isSearching, setIsSearching] = React.useState(false);

            React.useEffect(() => {
                const metaThemeColor = document.getElementById('theme-color-meta');
                if (metaThemeColor) {
                    metaThemeColor.setAttribute("content", isDark ? "#222222" : "#f4f4f4");
                }
            }, [isDark]);

            React.useEffect(() => {
                const fetchWeather = async () => {
                    setIsLoading(true);
                    try {
                        const url = `https://api.open-meteo.com/v1/forecast?latitude=${location.lat}&longitude=${location.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure,visibility&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max&timezone=auto`;
                        const res = await fetch(url);
                        const data = await res.json();
                        
                        const now = new Date();
                        const currentHourIndex = data.hourly.time.findIndex(t => new Date(t) >= now) || 0;
                        const next8Hours = data.hourly.time.slice(currentHourIndex, currentHourIndex + 8).map((time, i) => ({
                            time: i === 0 ? "Now" : formatTime(time),
                            icon: getWeatherIcon(data.hourly.weather_code[currentHourIndex + i]),
                            temp: `${Math.round(data.hourly.temperature_2m[currentHourIndex + i])}°`
                        }));

                        const next6Days = data.daily.time.slice(1, 7).map((time, i) => ({
                            date: formatDate(time, true),
                            temp: `${Math.round(data.daily.temperature_2m_min[i+1])}°/${Math.round(data.daily.temperature_2m_max[i+1])}°`
                        }));

                        setWeatherData({
                            date: formatDate(now.toISOString()),
                            temp: Math.round(data.current.temperature_2m),
                            hourly: next8Hours,
                            details: [
                                { label: "Sunrise", value: formatTimeAmPm(data.daily.sunrise[0]) },
                                { label: "Sunset", value: formatTimeAmPm(data.daily.sunset[0]) },
                                { label: "Feels like", value: `${Math.round(data.current.apparent_temperature)}°` },
                                { label: "Wind", value: `${Math.round(data.current.wind_speed_10m)} km/h ${getWindDirection(data.current.wind_direction_10m)}` },
                                { label: "Humidity", value: `${data.current.relative_humidity_2m}%` },
                                { label: "Atmospheric pressure", value: `${Math.round(data.current.surface_pressure)} hPa` },
                                { label: "Visibility", value: `${Math.round(data.current.visibility / 1000)} km` },
                                { label: "Ultraviolet", value: getUVText(data.daily.uv_index_max[0] || 0) },
                            ],
                            daily: next6Days
                        });
                    } catch (error) {
                        console.error("Failed to fetch weather", error);
                    }
                    setIsLoading(false);
                };

                fetchWeather();
            }, [location]);

            React.useEffect(() => {
                const searchCities = async () => {
                    if (searchQuery.length < 2) {
                        setSearchResults([]);
                        return;
                    }
                    setIsSearching(true);
                    try {
                        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${searchQuery}&count=5&language=en&format=json`);
                        const data = await res.json();
                        setSearchResults(data.results || []);
                    } catch (error) {
                        console.error("Search failed", error);
                    }
                    setIsSearching(false);
                };

                const timeoutId = setTimeout(searchCities, 500);
                return () => clearTimeout(timeoutId);
            }, [searchQuery]);

            const handleCitySelect = (city) => {
                setLocation({
                    name: `${city.name}${city.country ? `, ${city.country}` : ''}`,
                    lat: city.latitude,
                    lon: city.longitude
                });
                setIsSearchOpen(false);
                setSearchQuery("");
                setSearchResults([]);
            };

            const bgContainer = isDark ? "bg-[#222222]" : "bg-[#f4f4f4]";
            const textColor = isDark ? "text-white" : "text-[#1a1a1a]";
            const textMuted = isDark ? "text-[#a3a3a3]" : "text-[#737373]";
            const borderColor = isDark ? "border-[#333333]" : "border-[#e5e5e5]";

            return (
                <div className="min-h-screen w-full md:flex md:items-center md:justify-center">
                    
                    <div className={`relative w-full max-w-[100vw] h-[100dvh] md:h-auto md:min-h-0 md:max-w-5xl md:mx-auto md:my-10 md:rounded-[45px] md:shadow-2xl overflow-hidden transition-colors duration-500 flex flex-col ${bgContainer} ${textColor}`}>
                        
                        {isLoading && !weatherData && (
                            <div className="flex-1 flex justify-center items-center py-20">
                                <svg className="animate-spin h-8 w-8 text-current opacity-50" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            </div>
                        )}

                        {!isLoading && weatherData && (
                            <div className="flex-1 flex flex-col h-full px-5 py-6 sm:px-8 sm:py-8 md:p-12 overflow-y-auto md:overflow-visible scrollbar-hide">
                                
                                {}
                                <div className="flex justify-between items-start shrink-0">
                                    <div className="cursor-pointer group flex-1 pr-4" onClick={() => setIsSearchOpen(true)}>
                                        <h1 className="text-[22px] md:text-[32px] font-bold tracking-tight leading-none group-hover:opacity-70 transition-opacity flex items-center gap-1 flex-wrap break-words">
                                            {location.name}
                                            <svg className="w-4 h-4 md:w-6 md:h-6 opacity-0 group-hover:opacity-100 transition-opacity shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m6 9 6 6 6-6"/></svg>
                                        </h1>
                                        <p className={`text-[13px] md:text-[16px] mt-1.5 md:mt-3 ${textMuted}`}>{weatherData.date}</p>
                                    </div>
                                    <button onClick={() => setIsDark(!isDark)} className="p-1 -mr-1 md:p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors shrink-0">
                                        {isDark ? (
                                            <svg className="w-6 h-6 md:w-8 md:h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                                        ) : (
                                            <svg className="w-6 h-6 md:w-8 md:h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                                        )}
                                    </button>
                                </div>

                                {}
                                <div className="flex flex-col md:flex-row flex-1 mt-2 md:mt-12 md:gap-16">
                                    
                                    {}
                                    <div className="md:w-1/3 flex items-center justify-start shrink-0 mt-4 mb-8 sm:mt-6 sm:mb-10 md:m-0">
                                        <div className="flex">
                                            <span className="text-[100px] sm:text-[130px] md:text-[180px] font-bold tracking-tighter leading-none -ml-2">{weatherData.temp}</span>
                                            <span className="text-[60px] sm:text-[90px] md:text-[120px] font-bold leading-none mt-2 md:mt-4">&deg;</span>
                                        </div>
                                    </div>

                                    {}
                                    <div className="md:w-2/3 flex flex-col justify-between flex-1 gap-y-8 md:gap-y-10 pb-2">
                                        
                                        {}
                                        <div className="flex space-x-6 md:space-x-8 overflow-x-auto pb-2 scrollbar-hide w-full">
                                            {weatherData.hourly.map((h, i) => (
                                                <div key={i} className="flex flex-col items-center space-y-2 md:space-y-3 min-w-[40px]">
                                                    <span className={`text-[12px] md:text-[14px] font-medium ${textMuted}`}>{h.time}</span>
                                                    <Icon name={h.icon} className={`w-7 h-7 md:w-10 md:h-10 ${textMuted}`} />
                                                    <span className="text-[15px] md:text-[18px] font-bold">{h.temp}</span>
                                                </div>
                                            ))}
                                        </div>

                                        {}
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-y-5 sm:gap-y-6 md:gap-y-10 gap-x-3 w-full md:border-t md:border-b md:border-black/5 dark:md:border-white/5 md:py-8">
                                            {weatherData.details.map((detail, i) => (
                                                <div key={i} className="flex flex-col space-y-1 overflow-hidden">
                                                    <span className={`text-[12px] md:text-[14px] leading-tight pr-2 ${textMuted} truncate md:whitespace-normal`}>{detail.label}</span>
                                                    <span className="text-[15px] md:text-[18px] font-bold">{detail.value}</span>
                                                </div>
                                            ))}
                                        </div>

                                        {}
                                        <div className="flex justify-between w-full pt-2">
                                            {weatherData.daily.map((d, i) => (
                                                <div key={i} className="flex flex-col items-center space-y-1 md:space-y-2">
                                                    <span className={`text-[11px] md:text-[13px] font-medium ${textMuted}`}>{d.date}</span>
                                                    <span className="text-[12px] md:text-[16px] font-bold">{d.temp}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {}
                        {isSearchOpen && (
                            <div className={`absolute inset-0 z-50 flex flex-col p-6 pt-12 md:p-12 ${bgContainer} ${textColor}`}>
                                <div className="mt-8 md:mt-0 flex items-center space-x-3 mb-6 md:mb-10">
                                    <button onClick={() => setIsSearchOpen(false)} className="p-2 -ml-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                                        <svg className="w-6 h-6 md:w-8 md:h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m15 18-6-6 6-6"/></svg>
                                    </button>
                                    <input
                                        autoFocus
                                        className={`flex-1 w-full bg-transparent border-b ${borderColor} focus:outline-none py-2 md:py-4 text-lg md:text-3xl font-medium min-w-0`}
                                        placeholder="Search city..."
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                </div>
                                
                                <div className="flex-1 overflow-y-auto scrollbar-hide">
                                    {isSearching && <p className={`text-sm md:text-lg ${textMuted} mt-4`}>Searching...</p>}
                                    {!isSearching && searchResults.map((city, i) => (
                                        <div 
                                            key={i} 
                                            onClick={() => handleCitySelect(city)}
                                            className={`py-4 md:py-6 border-b ${borderColor} cursor-pointer hover:opacity-70 hover:pl-4 transition-all duration-300`}
                                        >
                                            <div className="font-bold text-lg md:text-2xl">{city.name}</div>
                                            <div className={`text-sm md:text-lg mt-1 ${textMuted}`}>{city.admin1 ? `${city.admin1}, ` : ''}{city.country}</div>
                                        </div>
                                    ))}
                                    {!isSearching && searchQuery.length >= 2 && searchResults.length === 0 && (
                                        <p className={`text-sm md:text-lg ${textMuted} mt-4`}>No cities found.</p>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
